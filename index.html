<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Storefront</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="app-header">
        <div class="header-container">
            <a href="#" class="logo-area" id="nav-logo">
                <span class="logo-icon"><i data-lucide="sparkles"></i></span>
                <span class="logo-text">LUXORA</span>
            </a>

            <div class="search-bar-container" id="header-search-bar">
                <div class="search-input-wrapper">
                    <i data-lucide="search" class="search-icon"></i>
                    <input type="text" id="search-input" placeholder="Search products...">
                </div>
            </div>

            <nav class="nav-actions">
                <button class="nav-btn active" id="btn-goto-listing">
                    <i data-lucide="grid"></i>
                    <span>Store</span>
                </button>
                <button class="nav-btn position-relative" id="btn-goto-cart">
                    <i data-lucide="shopping-bag"></i>
                    <span class="cart-badge" id="cart-badge-count">0</span>
                    <span>Cart</span>
                </button>
            </nav>
        </div>
    </header>

    <main class="main-content">
        <section class="controls-section" id="controls-section">
            <div class="controls-container">
                <div class="filter-group">
                    <label for="category-select">Category</label>
                    <div class="select-wrapper">
                        <select id="category-select">
                            <option value="all">All Categories</option>
                        </select>
                    </div>
                </div>
                <div class="filter-group">
                    <label for="sort-select">Sort By</label>
                    <div class="select-wrapper">
                        <select id="sort-select">
                            <option value="default">Featured</option>
                            <option value="price-asc">Price: Low to High</option>
                            <option value="price-desc">Price: High to Low</option>
                            <option value="rating-desc">Customer Rating</option>
                        </select>
                    </div>
                </div>
            </div>
        </section>

        <section class="page-view active" id="listing-page">
            <div class="products-grid" id="products-grid">
                <div class="shimmer-container">
                    <div class="shimmer-card"></div>
                    <div class="shimmer-card"></div>
                    <div class="shimmer-card"></div>
                    <div class="shimmer-card"></div>
                    <div class="shimmer-card"></div>
                    <div class="shimmer-card"></div>
                </div>
            </div>
        </section>

        <section class="page-view" id="details-page">
            <div class="back-nav-container">
                <button class="btn-back" id="btn-back-to-listing">
                    <i data-lucide="arrow-left"></i>
                    <span>Back to Products</span>
                </button>
            </div>
            <div class="product-details-container" id="product-details-content">
            </div>
        </section>

        <section class="page-view" id="cart-page">
            <h1 class="page-title">Your Cart</h1>
            <div class="cart-layout">
                <div class="cart-items-column" id="cart-items-container">
                </div>

                <div class="cart-summary-column">
                    <div class="summary-card">
                        <h3>Order Summary</h3>
                        <div class="summary-row">
                            <span>Subtotal</span>
                            <span id="summary-subtotal">$0.00</span>
                        </div>
                        <div class="summary-row text-success">
                            <span>Discount</span>
                            <span id="summary-discount">-$0.00</span>
                        </div>
                        <div class="summary-row">
                            <span>Shipping</span>
                            <span id="summary-shipping">Free</span>
                        </div>
                        <div class="summary-divider"></div>
                        <div class="summary-row total-row">
                            <span>Total</span>
                            <span id="summary-total">$0.00</span>
                        </div>
                        <button class="btn-checkout" id="btn-checkout">
                            <span>Proceed to Checkout</span>
                            <i data-lucide="credit-card"></i>
                        </button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div class="toast-container" id="toast-container"></div>

    <script src="app.js"></script>
</body>
</html>
